spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3356}/${DB_NAME:dangjang}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME:dangjang}
    password: ${DB_PASSWORD:root1234}

  jpa:
    hibernate:
      ddl-auto: none

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:sequence}
      timeout: 3s

jwt:
  secret-key: ${JWT_SECRET:dev-local-only-do-not-use-in-production-7f3c9b8a4d2e6f1c9a8b3d5e7f0a2c4b9e6d1f3a8c7b5e2d}
  access-token-validity-ms: ${JWT_ACCESS_TOKEN_VALIDITY_MS:900000}
  refresh-token-validity-ms: ${JWT_REFRESH_TOKEN_VALIDITY_MS:1209600000}

# logging levels are configured in logback-spring.xml per profile
